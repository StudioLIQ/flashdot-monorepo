[profile.default]
src = "contracts"
test = "test/foundry"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
fuzz = { runs = 256 }
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "forge-std/=lib/forge-std/src/",
]

[profile.ci]
fuzz = { runs = 1000 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
